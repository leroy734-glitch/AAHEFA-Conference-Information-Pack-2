<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#14181c">
<meta name="description" content="Document packet">
<title>Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14181c;
    --surface-hover: #1d242b;
    --paper: #edeae2;
    --muted: #8b94a0;
    --gold: #c9a227;
    --hairline: #2a3138;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 15vh 24px 80px;
  }

  main {
    width: 100%;
    max-width: 600px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 18px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(32px, 8vw, 44px);
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin: 0 0 14px;
  }

  .lede {
    font-size: 16px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 44ch;
    margin: 0 0 48px;
  }

  .manifest {
    list-style: none;
    margin: 0;
    padding: 0;
    border-top: 1px solid var(--hairline);
  }

  .manifest li {
    border-bottom: 1px solid var(--hairline);
    opacity: 0;
    animation: rise 0.5s ease forwards;
  }

  .manifest li:nth-child(1) { animation-delay: 0.05s; }
  .manifest li:nth-child(2) { animation-delay: 0.12s; }
  .manifest li:nth-child(3) { animation-delay: 0.19s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .manifest li { animation: none; opacity: 1; }
  }

  .doc-link {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 22px 6px;
    text-decoration: none;
    color: inherit;
    transition: padding-left 0.2s ease, background 0.2s ease;
  }

  .doc-link:hover,
  .doc-link:focus-visible {
    padding-left: 12px;
    background: var(--surface-hover);
  }

  .doc-link:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: -2px;
  }

  .doc-index {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    flex: none;
    width: 24px;
  }

  .doc-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .doc-title {
    font-size: 17px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .doc-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  .doc-arrow {
    flex: none;
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .doc-link:hover .doc-arrow,
  .doc-link:focus-visible .doc-arrow {
    transform: translate(2px, -2px);
    color: var(--gold);
  }

  footer {
    margin-top: 56px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Document packet</p>

  <!-- EDIT: change this heading to whatever you want the page to say -->
  <h1>Documents</h1>

  <!-- EDIT: one line describing what these three files are -->
  <p class="lede">Visa requirements, conference details, and a company profile — ready to view or download.</p>

  <ul class="manifest">
    <!-- EDIT each block below: point href at your actual PDF filename
         (upload it to the same folder as this page), and update the
         title + meta line (e.g. file type or size) -->
    <li>
      <a class="doc-link" href="Ghana%20Visa%20Requirements%20(2).pdf">
        <span class="doc-index">01</span>
        <span class="doc-body">
          <span class="doc-title">Ghana Visa Requirements</span>
          <span class="doc-meta">PDF</span>
        </span>
        <span class="doc-arrow">↗</span>
      </a>
    </li>
    <li>
      <a class="doc-link" href="Conference%20Information%20Pack.pdf">
        <span class="doc-index">02</span>
        <span class="doc-body">
          <span class="doc-title">Conference Information Pack</span>
          <span class="doc-meta">PDF</span>
        </span>
        <span class="doc-arrow">↗</span>
      </a>
    </li>
    <li>
      <a class="doc-link" href="AAHEFA%20Company%20Profile%20(print).pdf">
        <span class="doc-index">03</span>
        <span class="doc-body">
          <span class="doc-title">AAHEFA Company Profile (Print)</span>
          <span class="doc-meta">PDF</span>
        </span>
        <span class="doc-arrow">↗</span>
      </a>
    </li>
  </ul>

  <!-- EDIT or delete this line -->
  <footer>Updated July 2026</footer>
</main>
</body>
</html>
